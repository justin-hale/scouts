<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Bolivar Scouts Calendar</title>
    <!--
      GitHub Pages serves this for any unknown path (e.g. /august-2026).
      We encode the path into a query string and redirect to the app's
      index.html, which decodes it back into a clean URL before React loads.
      Technique: https://github.com/rafgraph/spa-github-pages
    -->
    <script type="text/javascript">
      var pathSegmentsToKeep = 0; // served from the domain root
      var l = window.location;
      l.replace(
        l.protocol +
          "//" +
          l.hostname +
          (l.port ? ":" + l.port : "") +
          l.pathname
            .split("/")
            .slice(0, 1 + pathSegmentsToKeep)
            .join("/") +
          "/?/" +
          l.pathname
            .slice(1)
            .split("/")
            .slice(pathSegmentsToKeep)
            .join("/")
            .replace(/&/g, "~and~") +
          (l.search ? "&" + l.search.slice(1).replace(/&/g, "~and~") : "") +
          l.hash
      );
    </script>
  </head>
  <body></body>
</html>
