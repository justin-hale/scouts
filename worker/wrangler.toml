name = "scouts-calendar"
main = "worker.js"
compatibility_date = "2025-01-01"

# Public (non-secret) configuration. Edit these to match your setup.
[vars]
GIST_ID = "REPLACE_WITH_YOUR_GIST_ID"
GIST_FILENAME = "calendar.json"
# Lock this to your GitHub Pages origin in production, e.g.
# "https://yourname.github.io". Use "*" only while testing.
ALLOWED_ORIGIN = "*"

# Secrets are NOT set here. Set them with wrangler so they stay encrypted:
#   npx wrangler secret put GITHUB_TOKEN
#   npx wrangler secret put ADMIN_PASSWORD
